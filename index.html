<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith Paste — Gerador de Raw para Loadstring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --border: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --success: #3fb950;
      --danger: #f85149;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a371f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .editor-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
    }

    .editor-header h2 {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .editor-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0d1117;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    .btn-success {
      background: var(--success);
      color: #0d1117;
    }

    textarea {
      width: 100%;
      min-height: 280px;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      background: var(--bg-secondary);
      color: var(--text-primary);
      border: none;
      resize: vertical;
      outline: none;
    }

    textarea::placeholder {
      color: var(--text-secondary);
      opacity: 0.7;
    }

    .output-section {
      margin-top: 1.5rem;
    }

    .output-box {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      word-break: break-all;
      position: relative;
    }

    .output-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .loadstring-code {
      background: var(--bg-primary);
      padding: 0.75rem;
      border-radius: 6px;
      margin-top: 0.5rem;
      cursor: pointer;
    }

    .loadstring-code:hover {
      outline: 1px solid var(--accent);
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.25rem;
      background: var(--success);
      color: #0d1117;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(1rem);
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      background: var(--danger);
    }

    .saved-section {
      margin-top: 2.5rem;
    }

    .saved-section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .saved-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .saved-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .saved-item-info {
      flex: 1;
      min-width: 0;
    }

    .saved-item-title {
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .saved-item-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-secondary);
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .saved-item-actions {
      display: flex;
      gap: 0.5rem;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Zenith Paste</h1>
      <p class="subtitle">Gerador de Raw para Loadstring — Salve seus scripts Lua na nuvem</p>
    </header>

    <div class="editor-card">
      <div class="editor-header">
        <h2>Editor Lua</h2>
        <div class="editor-actions">
          <input type="text" id="scriptTitle" placeholder="Nome do script (opcional)" 
            style="padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-size: 0.8rem; width: 180px;">
          <button class="btn btn-primary" id="saveBtn">Salvar na Nuvem</button>
          <button class="btn btn-secondary" id="copyLoadstringBtn">Copiar Loadstring</button>
        </div>
      </div>
      <textarea id="luaEditor" placeholder="Cole ou escreva seu script Lua aqui...&#10;&#10;Exemplo:&#10;print('Hello from loadstring!')&#10;game.Players.LocalPlayer.Character.Humanoid.WalkSpeed = 100"></textarea>
    </div>

    <div class="output-section">
      <div class="output-label">URL Raw (para loadstring)</div>
      <div class="output-box">
        <span id="rawUrl">Salve um script ou cole o código para gerar a URL</span>
        <div class="loadstring-code" id="loadstringCode" style="display: none;">
          loadstring(game:HttpGet("<span id="loadstringUrl"></span>"))()
        </div>
      </div>
    </div>

    <div class="saved-section">
      <h2>Scripts salvos</h2>
      <div class="saved-list" id="savedList">
        <div class="empty-state" id="emptyState">Nenhum script salvo ainda. Salve seu primeiro script acima!</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Copiado!</div>

  <script type="module" src="app.js"></script>
</body>
</html>
